name: Build Windows App

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/verify-release-tag.mjs "${{ github.ref_name }}"

      - name: Detect Windows signing configuration
        id: signing
        shell: pwsh
        run: |
          $hasLink = -not [string]::IsNullOrWhiteSpace($env:CSC_LINK)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)

          if ($hasLink -xor $hasPassword) {
            throw "Configure both WINDOWS_CSC_LINK and WINDOWS_CSC_KEY_PASSWORD, or leave both unset for an unsigned build."
          }

          if ($hasLink) {
            "enabled=true" >> $env:GITHUB_OUTPUT
            Write-Host "Windows code signing is enabled."
          } else {
            "enabled=false" >> $env:GITHUB_OUTPUT
            Write-Warning "Windows code signing is not configured. The generated executables will be unsigned."
          }

      - name: Verify no OAuth credentials are tracked
        shell: pwsh
        run: |
          $trackedOAuthFiles = git ls-files | Where-Object { $_ -match '(^|/)oauth_creds\.json$' }
          if ($trackedOAuthFiles) {
            $trackedOAuthFiles | ForEach-Object { Write-Error "Tracked OAuth credential file: $_" }
            exit 1
          }

      - name: Run tests
        run: pnpm test

      - name: Build installer and portable app
        run: |
          pnpm build
          pnpm exec electron-builder --win --publish never

      - name: Verify Windows release artifacts
        run: pnpm verify:windows-artifacts

      - name: Smoke test NSIS installer lifecycle
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem -LiteralPath release -Filter 'Gemini-OAuth-Switcher-*-setup-x64.exe' -File)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one Windows NSIS installer, found $($installers.Count)."
          }

          $temporaryRoot = Join-Path $env:RUNNER_TEMP "gemini-oauth-switcher-installer-smoke-$([guid]::NewGuid().ToString('N'))"
          $installDirectory = Join-Path $temporaryRoot "Custom Install With Spaces"
          $expectedDefaultInstallDirectory = Join-Path $env:LOCALAPPDATA 'Programs\Gemini OAuth Switcher'
          New-Item -ItemType Directory -Path $temporaryRoot | Out-Null
          "NSIS_SMOKE_TEMPORARY_ROOT=$temporaryRoot" >> $env:GITHUB_ENV

          & ./scripts/smoke-test-windows-installer.ps1 -InstallerPath $installers[0].FullName -TemporaryRoot $temporaryRoot -InstallDirectory $installDirectory -ExpectedDefaultInstallDirectory $expectedDefaultInstallDirectory

      - name: Cleanup NSIS smoke directory
        if: always()
        shell: pwsh
        run: |
          function Get-CleanupItem {
            param([Parameter(Mandatory = $true)][string]$Path)

            try {
              return Get-Item -LiteralPath $Path -Force -ErrorAction Stop
            } catch [System.Management.Automation.ItemNotFoundException] {
              return $null
            } catch {
              throw "Unable to inspect cleanup path '$Path': $($_.Exception.Message)"
            }
          }

          function Test-CleanupReparsePoint {
            param([Parameter(Mandatory = $true)][System.IO.FileSystemInfo]$Item)
            return ($Item.Attributes -band [System.IO.FileAttributes]::ReparsePoint) -ne 0
          }

          function Remove-CleanupLinkOnly {
            param([Parameter(Mandatory = $true)][System.IO.FileSystemInfo]$Item)

            if ($Item.PSIsContainer) {
              [System.IO.Directory]::Delete($Item.FullName, $false)
            } else {
              [System.IO.File]::Delete($Item.FullName)
            }
          }

          function Remove-CleanupPathSafely {
            param([Parameter(Mandatory = $true)][string]$Path)

            $item = Get-CleanupItem -Path $Path
            if ($null -eq $item) {
              return
            }

            if (Test-CleanupReparsePoint -Item $item) {
              Write-Warning "Removing cleanup reparse point without traversing it: $($item.FullName)"
              Remove-CleanupLinkOnly -Item $item
              return
            }

            if (-not $item.PSIsContainer) {
              [System.IO.File]::Delete($item.FullName)
              return
            }

            foreach ($child in @(Get-ChildItem -LiteralPath $item.FullName -Force -ErrorAction Stop)) {
              Remove-CleanupPathSafely -Path $child.FullName
            }
            [System.IO.Directory]::Delete($item.FullName, $false)
          }

          if ([string]::IsNullOrWhiteSpace($env:NSIS_SMOKE_TEMPORARY_ROOT)) {
            Write-Host "NSIS smoke directory was not created; nothing to clean."
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:RUNNER_TEMP)) {
            throw "RUNNER_TEMP is unavailable; refusing NSIS smoke cleanup."
          }

          $runnerTemp = [System.IO.Path]::TrimEndingDirectorySeparator([System.IO.Path]::GetFullPath($env:RUNNER_TEMP))
          $temporaryRoot = [System.IO.Path]::TrimEndingDirectorySeparator([System.IO.Path]::GetFullPath($env:NSIS_SMOKE_TEMPORARY_ROOT))
          $separator = [string][System.IO.Path]::DirectorySeparatorChar
          $runnerPrefix = if ($runnerTemp.EndsWith($separator)) { $runnerTemp } else { "$runnerTemp$separator" }
          $isStrictDescendant = -not [string]::Equals($temporaryRoot, $runnerTemp, [System.StringComparison]::OrdinalIgnoreCase) -and
            $temporaryRoot.StartsWith($runnerPrefix, [System.StringComparison]::OrdinalIgnoreCase)
          if (-not $isStrictDescendant) {
            throw "NSIS smoke cleanup target must be a strict descendant of RUNNER_TEMP: $temporaryRoot"
          }

          $runnerItem = Get-CleanupItem -Path $runnerTemp
          if ($null -eq $runnerItem -or -not $runnerItem.PSIsContainer -or (Test-CleanupReparsePoint -Item $runnerItem)) {
            throw "RUNNER_TEMP is missing, not a directory, or a reparse point; refusing cleanup: $runnerTemp"
          }

          $relativePath = [System.IO.Path]::GetRelativePath($runnerTemp, $temporaryRoot)
          $currentPath = $runnerTemp
          foreach ($segment in @($relativePath -split '[\\/]' | Where-Object { -not [string]::IsNullOrWhiteSpace($_) -and $_ -ne '.' })) {
            $currentPath = Join-Path -Path $currentPath -ChildPath $segment
            $item = Get-CleanupItem -Path $currentPath
            if ($null -eq $item) {
              Write-Host "NSIS smoke cleanup target is already absent: $temporaryRoot"
              exit 0
            }
            if (Test-CleanupReparsePoint -Item $item) {
              if ([string]::Equals($currentPath, $temporaryRoot, [System.StringComparison]::OrdinalIgnoreCase)) {
                Write-Warning "Removing NSIS smoke root link without traversing it: $temporaryRoot"
                Remove-CleanupLinkOnly -Item $item
                exit 0
              }
              throw "NSIS smoke cleanup ancestor is a reparse point; refusing traversal: $currentPath"
            }
          }

          Remove-CleanupPathSafely -Path $temporaryRoot

      - name: Verify release Authenticode signatures
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $releaseExecutables = @(
            Get-ChildItem -Path release -Filter 'Gemini-OAuth-Switcher-*-setup-x64.exe'
            Get-ChildItem -Path release -Filter 'Gemini-OAuth-Switcher-*-portable-x64.exe'
          )
          foreach ($executable in $releaseExecutables) {
            $signature = Get-AuthenticodeSignature -LiteralPath $executable.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Invalid Authenticode signature for $($executable.Name): $($signature.Status)"
            }
          }

      - name: Report unsigned release
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.enabled != 'true'
        shell: pwsh
        run: Write-Warning "Publishing unsigned Windows executables. Windows SmartScreen may warn users before installation."

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gemini-oauth-switcher-windows-x64
          if-no-files-found: error
          retention-days: 1
          path: |
            release/Gemini-OAuth-Switcher-*-setup-x64.exe
            release/Gemini-OAuth-Switcher-*-setup-x64.exe.blockmap
            release/Gemini-OAuth-Switcher-*-portable-x64.exe
            release/latest.yml

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/Gemini-OAuth-Switcher-*-setup-x64.exe
            release/Gemini-OAuth-Switcher-*-setup-x64.exe.blockmap
            release/Gemini-OAuth-Switcher-*-portable-x64.exe
            release/latest.yml
