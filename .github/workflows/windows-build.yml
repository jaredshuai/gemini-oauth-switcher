name: Build Windows App

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify no OAuth credentials are tracked
        shell: pwsh
        run: |
          $trackedOAuthFiles = git ls-files | Where-Object { $_ -match '(^|/)oauth_creds\.json$' }
          if ($trackedOAuthFiles) {
            $trackedOAuthFiles | ForEach-Object { Write-Error "Tracked OAuth credential file: $_" }
            exit 1
          }

      - name: Run tests
        run: pnpm test

      - name: Build installer and portable app
        run: pnpm dist:win

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gemini-oauth-switcher-windows-x64
          if-no-files-found: error
          retention-days: 14
          path: |
            release/Gemini OAuth Switcher-*-setup-x64.exe
            release/Gemini OAuth Switcher-*-portable-x64.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/Gemini OAuth Switcher-*-setup-x64.exe
            release/Gemini OAuth Switcher-*-portable-x64.exe
